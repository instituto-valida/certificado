<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Verificación Holográfica</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #060b13; /* Fondo azul noche profundo */
            color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .certificate-container {
            background: linear-gradient(145deg, #0b1528, #080f1e); /* Degradado metalizado */
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #00f2fe; /* Borde de neón cian */
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.15), inset 0 0 15px rgba(0, 242, 254, 0.05);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        /* Efecto de cuadrícula digital de fondo */
        .certificate-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(0, 242, 254, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 254, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        .coat-of-arms {
            max-width: 95px;
            height: auto;
            margin-bottom: 15px;
            /* Filtro brillante futurista para el escudo */
            filter: drop-shadow(0px 0px 8px rgba(0, 242, 254, 0.4));
        }
        .institution-title {
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 5px 0;
            color: #00f2fe; /* Texto color neón */
            font-weight: 800;
        }
        .sub-title {
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 5px 0;
            color: #94a3b8;
        }
        .cert-number {
            font-size: 13px;
            color: #38bdf8;
            font-weight: bold;
            margin-left: 5px;
        }
        .divider {
            border: none;
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            margin: 25px 0;
            position: relative;
        }
        .main-title {
            font-size: 38px;
            font-weight: 900;
            text-align: center;
            margin: 15px 0;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .content-text {
            font-size: 18px;
            line-height: 1.8;
            text-align: center;
            margin: 30px 10px;
            color: #94a3b8;
            position: relative;
        }
        .label-text {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        .highlight {
            font-weight: 700;
            font-size: 26px;
            letter-spacing: 1px;
            color: #ffffff;
            display: inline-block;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }
        .highlight-module {
            font-size: 32px;
            color: #00f2fe;
            letter-spacing: 3px;
            font-weight: 800;
            text-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
            margin: 10px 0;
        }
        .info-group {
            margin: 20px 0;
        }
        .footer-date {
            text-align: right;
            font-size: 14px;
            margin-top: 40px;
            color: #64748b;
            letter-spacing: 1px;
        }
        .verification-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }
        .badge-container {
            text-align: center;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="certificate-container">
    
    <div class="header">
        <img class="coat-of-arms" src="https://upload.wikimedia.org/wikipedia/commons/c/cc/Escudo_nacional_del_Per%C3%BA.svg" alt="Escudo Nacional del Perú">
        <div class="institution-title">Ministerio de Educación</div>
        <div class="sub-title">Centro de Educación Técnico – Productiva <span class="cert-number"> N°34016</span></div>
        <div class="institution-title" style="font-size: 14px; margin-top: 8px; color: #38bdf8;">“Pedro Paulet” de Huancavelica</div>
    </div>

    <div class="divider"></div>

    <div class="main-title">Certificado Digital</div>

    <div class="content-text">
        <div class="info-group">
            <span class="label-text">Titular del Documento</span>
            <span class="highlight">ISRAEL TICLLACURI QUISPE</span>
        </div>
        
        <div class="info-group">
            <span class="label-text">Módulo Académico Aprobado</span>
            <span class="highlight highlight-module">OFIMÁTICA</span>
        </div>
        
        <div class="info-group" style="font-size: 16px; margin-top: 25px; color: #cbd5e1;">
            Nivel: <strong style="color: #00f2fe;">Medio</strong> | Duración Registrada: <strong style="color: #00f2fe;">390 Horas</strong>
        </div>
    </div>

    <div class="footer-date">
        HUANCAVELICA, 09/DIC/2023
    </div>

    <div class="divider" style="margin-bottom: 15px;"></div>
    
    <div class="badge-container">
        <div class="verification-badge">
            VERIFICACIÓN EXITOSA
        </div>
    </div>

</div>

</body>
</html>
